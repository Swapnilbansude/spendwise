<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0A0B12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Spendwise" />
<title>Spendwise - Family Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; overscroll-behavior-y: none;
    background: #0A0B12;
    background-image:
      radial-gradient(ellipse 800px 500px at 15% -10%, rgba(139,124,255,0.16), transparent 60%),
      radial-gradient(ellipse 600px 500px at 110% 10%, rgba(52,211,153,0.07), transparent 55%),
      linear-gradient(165deg, #0A0B12 0%, #100E1C 45%, #0A0B12 100%);
    background-attachment: fixed;
  }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { min-height: 100vh; }
  input, select, button, textarea { font-family: 'Inter', system-ui, sans-serif; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  input:focus, select:focus, textarea:focus {
    border-color: #8B7CFF !important;
    box-shadow: 0 0 0 3px rgba(139,124,255,0.15);
  }
  input, select, textarea { transition: border-color 0.2s, box-shadow 0.2s; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  :focus-visible { outline: 2px solid #8B7CFF; outline-offset: 2px; border-radius: 6px; }

  /* ─── Micro-interaction utilities ─────────────────────────────── */
  .sw-press { transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), filter 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.2s; }
  .sw-press:active { transform: scale(0.96); filter: brightness(0.94); }
  @media (hover: hover) {
    .sw-press:hover { filter: brightness(1.06); }
    .sw-card-hover:hover { border-color: rgba(139,124,255,0.35) !important; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,0,0,0.28); }
  }
  .sw-card-hover { transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
  .sw-fadein { animation: swFadeIn 0.35s cubic-bezier(.16,1,.3,1) both; }
  .sw-fadein-delay1 { animation: swFadeIn 0.35s cubic-bezier(.16,1,.3,1) 0.04s both; }
  .sw-fadein-delay2 { animation: swFadeIn 0.35s cubic-bezier(.16,1,.3,1) 0.08s both; }
  @keyframes swFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes swSlideUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes swPulseGlow { 0%,100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.04); } }
  .sw-sheet-anim { animation: swSlideUp 0.32s cubic-bezier(.16,1,.3,1) both; }
  .sw-glow { animation: swPulseGlow 4s ease-in-out infinite; }
  @keyframes swToastIn { from { opacity: 0; transform: translateY(16px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes swToastOut { from { opacity: 1; transform: translateY(0) scale(1); max-height: 60px; margin-top: 0; } to { opacity: 0; transform: translateY(6px) scale(0.97); max-height: 0; margin-top: -8px; } }
  .sw-toast-in { animation: swToastIn 0.32s cubic-bezier(.34,1.56,.64,1) both; }
  .sw-toast-out { animation: swToastOut 0.22s ease both; overflow: hidden; }

  /* Loading splash */
  #splash {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 9999; font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0A0B12;
  }
  #splash .logo { font-size: 56px; margin-bottom: 12px; animation: pulse 1.4s ease-in-out infinite; }
  #splash .brand { color: #F2F3F7; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
</style>
</head>
<body>
<div id="splash">
  <div class="logo">💳</div>
  <div class="brand">Spendwise</div>
</div>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;


// ─── Constants ────────────────────────────────────────────────────────────────

const CATEGORIES = [
  { id: "food",          label: "Food & Dining",  icon: "🍔", color: "#FF8C42" },
  { id: "transport",     label: "Transport",       icon: "🚗", color: "#4ECDC4" },
  { id: "shopping",      label: "Shopping",        icon: "🛍️", color: "#A78BFA" },
  { id: "health",        label: "Health",          icon: "💊", color: "#34D399" },
  { id: "entertainment", label: "Entertainment",   icon: "🎬", color: "#F472B6" },
  { id: "bills",         label: "Bills",           icon: "📄", color: "#60A5FA" },
  { id: "travel",        label: "Travel",          icon: "✈️", color: "#FBBF24" },
  { id: "other",         label: "Other",           icon: "📦", color: "#9CA3AF" },
];

const MEMBER_COLORS = ["#8B7CFF","#34D399","#FF8C42","#F472B6","#60A5FA","#FBBF24","#FB7185","#4ECDC4"];

const CURRENCIES = [
  { code: "USD", symbol: "$",  name: "US Dollar",        flag: "🇺🇸" },
  { code: "EUR", symbol: "€",  name: "Euro",             flag: "🇪🇺" },
  { code: "GBP", symbol: "£",  name: "British Pound",    flag: "🇬🇧" },
  { code: "INR", symbol: "₹",  name: "Indian Rupee",     flag: "🇮🇳" },
  { code: "JPY", symbol: "¥",  name: "Japanese Yen",     flag: "🇯🇵" },
  { code: "AUD", symbol: "A$", name: "Australian Dollar",flag: "🇦🇺" },
  { code: "CAD", symbol: "C$", name: "Canadian Dollar",  flag: "🇨🇦" },
  { code: "CNY", symbol: "¥",  name: "Chinese Yuan",     flag: "🇨🇳" },
  { code: "AED", symbol: "د.إ",name: "UAE Dirham",       flag: "🇦🇪" },
  { code: "SGD", symbol: "S$", name: "Singapore Dollar", flag: "🇸🇬" },
];
const getCurrency = (code) => CURRENCIES.find((c) => c.code === code) || CURRENCIES[0];
const ZERO_DECIMAL = ["JPY"];

const TOAST_CONFIG = {
  success: { icon: "✓",  color: "#34D399", bg: "#34D39918" },
  error:   { icon: "✕",  color: "#FB7185", bg: "#FB718518" },
  warning: { icon: "⚠️", color: "#FBBF24", bg: "#FBBF2418" },
  info:    { icon: "ℹ",  color: "#8B7CFF", bg: "#8B7CFF18" },
};
const TOAST_DURATION = { success: 2800, info: 2800, warning: 3800, error: 4200 };

// ─── Seed data (empty — first user to register creates their own group) ───────

const SEED_USERS = [];
const SEED_GROUPS = [];
const SEED_EXPENSES = [];

// ─── Helpers ───────────────────────────────────────────────────────────────────

const getCat  = (id) => CATEGORIES.find((c) => c.id === id) || CATEGORIES[7];
const fmt = (n, code = "USD") => {
  const dec = ZERO_DECIMAL.includes(code) ? 0 : 2;
  return Number(n).toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });
};
const money = (n, code = "USD") => `${getCurrency(code).symbol}${fmt(n, code)}`;
const TODAY   = new Date().toISOString().slice(0, 10);
const YESTERDAY = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

function formatDateLabel(d) {
  if (d === TODAY) return "Today";
  if (d === YESTERDAY) return "Yesterday";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function greeting() {
  const h = new Date().getHours();
  if (h < 5) return "Good night";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Good night";
}

function greetingEmoji() {
  const h = new Date().getHours();
  if (h < 5) return "🌙";
  if (h < 12) return "☀️";
  if (h < 17) return "🌤️";
  if (h < 21) return "🌇";
  return "🌙";
}

function groupByDate(list) {
  const map = {};
  list.forEach((e) => { if (!map[e.date]) map[e.date] = []; map[e.date].push(e); });
  return Object.entries(map).sort((a, b) => (a[0] < b[0] ? 1 : -1));
}

function initials(name) {
  return name.split(" ").map((w) => w[0]).join("").slice(0, 2).toUpperCase();
}

// ─── Sub-components ───────────────────────────────────────────────────────────

function Avatar({ user, size = 36 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: size / 3,
      background: `linear-gradient(155deg, ${user.color}40, ${user.color}15)`,
      border: `1.5px solid ${user.color}80`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.33, fontWeight: 700, color: user.color, flexShrink: 0,
      fontFamily: "'Plus Jakarta Sans',sans-serif",
      boxShadow: `0 2px 8px ${user.color}22`,
    }}>
      {user.avatar || initials(user.name)}
    </div>
  );
}

function RadialGauge({ spent, budget, currency }) {
  const pct = Math.min(spent / budget, 1);
  const r = 72, cx = 90, cy = 90;
  const circumference = 2 * Math.PI * r;
  const arcLen = circumference * 0.75;
  const gap    = circumference * 0.25;
  const offset = arcLen * (1 - pct);
  const danger = pct > 0.9;
  const warn   = pct > 0.7 && !danger;
  const color  = danger ? "#FB7185" : warn ? "#FBBF24" : "#8B7CFF";
  const gradId = danger ? "gaugeDanger" : warn ? "gaugeWarn" : "gaugeOk";
  return (
    <div style={{ position: "relative", width: 180, height: 180 }}>
      <div className="sw-glow" style={{
        position: "absolute", inset: 18, borderRadius: "50%",
        background: `radial-gradient(circle, ${color}33 0%, transparent 70%)`,
        filter: "blur(10px)", pointerEvents: "none",
      }} />
      <svg width="180" height="180" viewBox="0 0 180 180" style={{ position: "relative" }}>
        <defs>
          <linearGradient id="gaugeOk" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#A89AFF" />
            <stop offset="100%" stopColor="#6D5AE0" />
          </linearGradient>
          <linearGradient id="gaugeWarn" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#FFD580" />
            <stop offset="100%" stopColor="#FBBF24" />
          </linearGradient>
          <linearGradient id="gaugeDanger" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#FFA3AC" />
            <stop offset="100%" stopColor="#FB7185" />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1D1E28" strokeWidth="14"
          strokeDasharray={`${arcLen} ${gap}`} strokeLinecap="round"
          transform={`rotate(135 ${cx} ${cy})`} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={`url(#${gradId})`} strokeWidth="14"
          strokeDasharray={`${Math.max(arcLen - offset, 0)} ${circumference}`}
          strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`}
          style={{ transition: "stroke-dasharray 0.8s cubic-bezier(.16,1,.3,1), stroke 0.4s" }} />
        <text x={cx} y={cy - 10} textAnchor="middle" fill="#F2F3F7" fontSize="21" fontWeight="800" fontFamily="'Plus Jakarta Sans',sans-serif">{money(spent, currency)}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fill="#7B7E8E" fontSize="11" fontFamily="Inter,sans-serif">of {money(budget, currency)}</text>
        <text x={cx} y={cy + 33} textAnchor="middle" fill={color} fontSize="12" fontWeight="700" fontFamily="Inter,sans-serif">{Math.round(pct * 100)}% used</text>
      </svg>
    </div>
  );
}

// ─── AUTH SCREENS ─────────────────────────────────────────────────────────────

function AuthScreen({ users, onLogin, onRegister }) {
  const [mode, setMode] = React.useState("login"); // login | register
  const [form, setForm] = React.useState({ name: "", email: "", password: "", confirm: "", currency: "USD" });
  const [error, setError] = React.useState("");
  const [showPass, setShowPass] = React.useState(false);

  const S = {
    root: { minHeight: "100vh", background: "transparent", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 24px", fontFamily: "Inter,system-ui,sans-serif" },
    logoWrap: { width: 76, height: 76, borderRadius: 22, background: "linear-gradient(155deg, #8B7CFF 0%, #6D5AE0 100%)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 38, marginBottom: 18, boxShadow: "0 12px 36px rgba(139,124,255,0.35)" },
    brand: { fontSize: 30, fontWeight: 800, color: "#F2F3F7", letterSpacing: "-1px", marginBottom: 6, fontFamily: "'Plus Jakarta Sans',sans-serif" },
    tagline: { fontSize: 13, color: "#7B7E8E", marginBottom: 36, letterSpacing: 0.2 },
    card: { width: "100%", maxWidth: 400, background: "linear-gradient(165deg, #181A26 0%, #14151E 100%)", borderRadius: 26, padding: 28, border: "1px solid #24262F", boxShadow: "0 20px 60px rgba(0,0,0,0.35)" },
    title: { fontSize: 21, fontWeight: 800, color: "#F2F3F7", marginBottom: 6, fontFamily: "'Plus Jakarta Sans',sans-serif", letterSpacing: "-0.3px" },
    sub: { fontSize: 13, color: "#7B7E8E", marginBottom: 24 },
    label: { fontSize: 11, color: "#7B7E8E", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6, display: "block" },
    inputWrap: { position: "relative", marginBottom: 16 },
    input: { width: "100%", background: "#0A0B12", border: "1.5px solid #24262F", borderRadius: 12, padding: "13px 14px", color: "#F2F3F7", fontSize: 15, fontFamily: "inherit", outline: "none", boxSizing: "border-box", transition: "border-color 0.2s" },
    eyeBtn: { position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#7B7E8E", cursor: "pointer", fontSize: 16 },
    btn: { width: "100%", padding: 15, background: "linear-gradient(135deg,#8B7CFF,#6D5AE0)", border: "none", borderRadius: 13, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 4, boxShadow: "0 8px 24px rgba(139,124,255,0.4)", letterSpacing: 0.3 },
    toggle: { textAlign: "center", marginTop: 18, fontSize: 13, color: "#7B7E8E" },
    toggleLink: { color: "#8B7CFF", fontWeight: 700, cursor: "pointer", marginLeft: 4, background: "none", border: "none", fontSize: 13, fontFamily: "inherit" },
    error: { background: "#FB718522", border: "1px solid #FB718544", borderRadius: 10, padding: "10px 14px", color: "#FB7185", fontSize: 13, marginBottom: 16 },
  };

  function set(k, v) { setForm((p) => ({ ...p, [k]: v })); setError(""); }

  function handleLogin() {
    const u = users.find((u) => u.email.toLowerCase() === form.email.toLowerCase() && u.password === form.password);
    if (!u) { setError("Invalid email or password."); return; }
    onLogin(u);
  }

  function handleRegister() {
    if (!form.name.trim()) { setError("Please enter your name."); return; }
    if (!form.email.includes("@")) { setError("Please enter a valid email."); return; }
    if (form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
    if (form.password !== form.confirm) { setError("Passwords don't match."); return; }
    if (users.find((u) => u.email.toLowerCase() === form.email.toLowerCase())) { setError("Email already registered."); return; }
    const newUser = {
      id: "u" + Date.now(), name: form.name.trim(), email: form.email.toLowerCase(),
      password: form.password, avatar: initials(form.name.trim()),
      color: MEMBER_COLORS[users.length % MEMBER_COLORS.length],
    };
    onRegister(newUser, form.currency);
  }

  return (
    <div style={S.root}>
      <div className="sw-fadein" style={S.logoWrap}>💳</div>
      <div className="sw-fadein-delay1" style={S.brand}>Spendwise</div>
      <div className="sw-fadein-delay1" style={S.tagline}>Smart family expense tracking</div>

      <div className="sw-fadein-delay2" style={S.card}>
        <div style={S.title}>{mode === "login" ? "Welcome back" : "Create account"}</div>
        <div style={S.sub}>{mode === "login" ? "Sign in to your family account" : "Join or start a family group"}</div>

        {error && <div style={S.error}>⚠️ {error}</div>}

        {mode === "register" && (
          <div style={S.inputWrap}>
            <label style={S.label}>Full Name</label>
            <input style={S.input} placeholder="Your full name" value={form.name} onChange={(e) => set("name", e.target.value)} />
          </div>
        )}
        <div style={S.inputWrap}>
          <label style={S.label}>Email</label>
          <input style={S.input} placeholder="you@example.com" type="email" value={form.email} onChange={(e) => set("email", e.target.value)} />
        </div>
        <div style={S.inputWrap}>
          <label style={S.label}>Password</label>
          <input style={S.input} placeholder="••••••••" type={showPass ? "text" : "password"} value={form.password} onChange={(e) => set("password", e.target.value)} />
          <button style={S.eyeBtn} onClick={() => setShowPass((p) => !p)}>{showPass ? "🙈" : "👁️"}</button>
        </div>
        {mode === "register" && (
          <div style={S.inputWrap}>
            <label style={S.label}>Confirm Password</label>
            <input style={S.input} placeholder="••••••••" type={showPass ? "text" : "password"} value={form.confirm} onChange={(e) => set("confirm", e.target.value)} />
          </div>
        )}
        {mode === "register" && (
          <div style={S.inputWrap}>
            <label style={S.label}>Preferred Currency</label>
            <select style={{ ...S.input, appearance: "none", cursor: "pointer" }} value={form.currency} onChange={(e) => set("currency", e.target.value)}>
              {CURRENCIES.map((c) => (
                <option key={c.code} value={c.code}>{c.flag} {c.code} — {c.name} ({c.symbol})</option>
              ))}
            </select>
          </div>
        )}

        <button className="sw-press" style={S.btn} onClick={mode === "login" ? handleLogin : handleRegister}>
          {mode === "login" ? "Sign In →" : "Create Account →"}
        </button>

        <div style={S.toggle}>
          {mode === "login" ? "Don't have an account?" : "Already have an account?"}
          <button style={S.toggleLink} onClick={() => { setMode(mode === "login" ? "register" : "login"); setError(""); }}>
            {mode === "login" ? "Register" : "Sign In"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── EXPENSE MODAL ─────────────────────────────────────────────────────────────

function ExpenseModal({ onClose, onSave, initial, members, currentUserId, isAdmin, currency }) {
  const [form, setForm] = React.useState(initial || {
    title: "", amount: "", category: "food", date: TODAY, note: "", userId: currentUserId,
  });
  const [error, setError] = React.useState("");
  const cur = getCurrency(currency);

  function set(k, v) { setForm((p) => ({ ...p, [k]: v })); setError(""); }

  function save() {
    if (!form.title.trim()) { setError("Please enter a title."); return; }
    if (!form.amount || isNaN(parseFloat(form.amount)) || parseFloat(form.amount) <= 0) { setError("Please enter a valid amount."); return; }
    onSave({ ...form, amount: parseFloat(form.amount), title: form.title.trim() });
  }

  const S = {
    overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100, backdropFilter: "blur(4px)" },
    sheet: { background: "linear-gradient(165deg, #181A26 0%, #14151E 100%)", borderRadius: "24px 24px 0 0", padding: "24px 20px 40px", width: "100%", maxWidth: 480, border: "1px solid #24262F", borderBottom: "none", maxHeight: "90vh", overflowY: "auto" },
    handle: { width: 40, height: 4, background: "#24262F", borderRadius: 4, margin: "0 auto 20px" },
    title: { fontSize: 18, fontWeight: 800, color: "#F2F3F7", marginBottom: 20, fontFamily: "'Plus Jakarta Sans',sans-serif" },
    label: { fontSize: 11, color: "#7B7E8E", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6, display: "block" },
    input: { width: "100%", background: "#0A0B12", border: "1.5px solid #24262F", borderRadius: 12, padding: "12px 14px", color: "#F2F3F7", fontSize: 15, fontFamily: "inherit", outline: "none", boxSizing: "border-box" },
    group: { marginBottom: 18 },
    catGrid: { display: "flex", flexWrap: "wrap", gap: 8 },
    catChip: (a, c) => ({ padding: "7px 11px", borderRadius: 10, border: `1.5px solid ${a ? c : "#24262F"}`, background: a ? c + "22" : "#0A0B12", color: a ? c : "#7B7E8E", fontSize: 12, fontWeight: a ? 700 : 400, cursor: "pointer", display: "flex", gap: 5, alignItems: "center", transition: "all 0.2s" }),
    memberRow: { display: "flex", gap: 8, flexWrap: "wrap" },
    memberChip: (a, c) => ({ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 20, border: `1.5px solid ${a ? c : "#24262F"}`, background: a ? c + "22" : "#0A0B12", color: a ? c : "#7B7E8E", fontSize: 12, fontWeight: a ? 700 : 400, cursor: "pointer", transition: "all 0.2s" }),

// ─── Local persistence ────────────────────────────────────────────────────────

const STORAGE_KEY = "spendwise_v2";

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.users || !data.groups || !data.expenses) return null;
    return data;
  } catch {
    return null;
  }
}

function savePersisted(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
}

function App() {
  const persisted = React.useMemo(() => loadPersisted(), []);
  const [users,    setUsers]    = React.useState(persisted?.users    || SEED_USERS);
  const [groups,   setGroups]   = React.useState(persisted?.groups   || SEED_GROUPS);
  const [expenses, setExpenses] = React.useState(persisted?.expenses || SEED_EXPENSES);
  const [currentUser, setCurrentUser] = React.useState(null);
  const [activeGroupId, setActiveGroupId] = React.useState((persisted?.groups || SEED_GROUPS)[0]?.id || null);
  const [activeTab,   setActiveTab]   = React.useState("dashboard");
  const [showExpModal,  setShowExpModal]  = React.useState(false);
  const [showInvModal,  setShowInvModal]  = React.useState(false);
  const [showSettingsModal, setShowSettingsModal] = React.useState(false);
  const [showProfileModal, setShowProfileModal] = React.useState(false);
  const [showCreateGroupModal, setShowCreateGroupModal] = React.useState(false);
  const [showGroupSwitcher, setShowGroupSwitcher] = React.useState(false);
  const [editExpense,   setEditExpense]   = React.useState(null);
  const [deleteId,      setDeleteId]      = React.useState(null);
  const [removeMemberId, setRemoveMemberId] = React.useState(null);
  const [showResetConfirm, setShowResetConfirm] = React.useState(false);
  const [filter,        setFilter]        = React.useState("all");
  const [memberFilter,  setMemberFilter]  = React.useState("all");
  const [search,        setSearch]        = React.useState("");
  const [showProfileMenu, setShowProfileMenu] = React.useState(false);
  const [toasts, setToasts] = React.useState([]); // [{id, message, type, leaving}]

  // Groups the current user belongs to
  const myGroups = React.useMemo(
    () => groups.filter((g) => currentUser && g.members.some((m) => m.userId === currentUser.id)),
    [groups, currentUser]
  );

  // Persist state changes to localStorage
  React.useEffect(() => {
    savePersisted({ users, groups, expenses });
  }, [users, groups, expenses]);

  // Ensure activeGroupId is valid for current user
  React.useEffect(() => {
    if (!currentUser) return;
    if (!myGroups.find((g) => g.id === activeGroupId)) {
      setActiveGroupId(myGroups[0]?.id || null);
    }
  }, [currentUser, myGroups, activeGroupId]);

  const group = React.useMemo(() => groups.find((g) => g.id === activeGroupId) || null, [groups, activeGroupId]);

  const isAdmin = React.useMemo(() => {
    if (!group || !currentUser) return false;
    const m = group.members.find((m) => m.userId === currentUser.id);
    return m?.role === "admin";
  }, [group, currentUser]);

  const members = React.useMemo(() => {
    if (!group) return [];
    return group.members
      .map((gm) => {
        const u = users.find((u) => u.id === gm.userId);
        return u ? { ...u, role: gm.role } : null;
      })
      .filter(Boolean);
  }, [group, users]);

  const groupExpenses = React.useMemo(
    () => (group ? expenses.filter((e) => e.groupId === group.id) : []),
    [expenses, group]
  );

  const filtered = React.useMemo(() => {
    let list = groupExpenses;
    if (filter !== "all") list = list.filter((e) => e.category === filter);
    if (memberFilter !== "all") list = list.filter((e) => e.userId === memberFilter);
    if (search.trim()) list = list.filter((e) => e.title.toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [groupExpenses, filter, memberFilter, search]);

  const totalSpent = React.useMemo(() => groupExpenses.reduce((s, e) => s + e.amount, 0), [groupExpenses]);
  const remaining  = (group?.budget || 0) - totalSpent;

  const byMember = React.useMemo(() => members.map((m) => ({
    ...m,
    total: groupExpenses.filter((e) => e.userId === m.id).reduce((s, e) => s + e.amount, 0),
    count: groupExpenses.filter((e) => e.userId === m.id).length,
  })).sort((a, b) => b.total - a.total), [members, groupExpenses]);

  const byCategory = React.useMemo(() => {
    const map = {};
    groupExpenses.forEach((e) => { map[e.category] = (map[e.category] || 0) + e.amount; });
    return CATEGORIES.map((c) => ({ ...c, total: map[c.id] || 0 })).filter((c) => c.total > 0).sort((a, b) => b.total - a.total);
  }, [groupExpenses]);

  function showToast(message, type = "success") {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type, leaving: false }]);
    const duration = TOAST_DURATION[type] || 2800;
    setTimeout(() => {
      // Trigger exit animation, then remove after it finishes
      setToasts((prev) => prev.map((t) => (t.id === id ? { ...t, leaving: true } : t)));
      setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 220);
    }, duration);
  }

  function handleLogin(u) {
    setCurrentUser(u);
    showToast(`Welcome back, ${u.name.split(" ")[0]}! 👋`, "success");
  }

  function handleRegister(u, currency) {
    const newGroupId = "g" + Date.now();
    setUsers((p) => [...p, u]);
    setGroups((p) => [...p, {
      id: newGroupId,
      name: `${u.name.split(" ")[0]}'s Family`,
      budget: 2000,
      currency: currency || "USD",
      members: [{ userId: u.id, role: "admin" }],
    }]);
    setCurrentUser(u);
    setActiveGroupId(newGroupId);
    showToast(`Welcome to Spendwise, ${u.name.split(" ")[0]}! 🎉`, "success");
  }

  function handleInvite(u, role) {
    setUsers((p) => [...p, u]);
    setGroups((p) => p.map((g) => g.id === group.id
      ? { ...g, members: [...g.members, { userId: u.id, role: role || "member" }] }
      : g
    ));
    showToast(`${u.name} added to ${group.name}!`, "success");
  }

  function updateProfile(updates) {    setUsers((prev) => prev.map((u) => u.id === currentUser.id ? { ...u, ...updates } : u));
    setCurrentUser((prev) => ({ ...prev, ...updates }));
    showToast("Profile updated.", "success");
  }

  function deleteAccount() {
    const uid = currentUser.id;
    // Remove user from all groups; delete groups that would have zero admins/members as a result
    setGroups((prev) => prev
      .map((g) => ({ ...g, members: g.members.filter((m) => m.userId !== uid) }))
      .filter((g) => g.members.length > 0)
    );
    // Delete this user's expenses everywhere
    setExpenses((prev) => prev.filter((e) => e.userId !== uid));
    // Remove the user record
    setUsers((prev) => prev.filter((u) => u.id !== uid));
    setShowProfileModal(false);
    setCurrentUser(null);
  }

  function saveExpense(data) {
    if (data.id) {
      setExpenses((p) => p.map((e) => (e.id === data.id ? { ...e, ...data } : e)));
      showToast("Expense updated.", "success");
    } else {
      setExpenses((p) => [{ id: Date.now(), groupId: group.id, ...data }, ...p]);
      showToast("Expense added.", "success");
    }
    setShowExpModal(false);
    setEditExpense(null);
  }

  function deleteExpense(id) {
    setExpenses((p) => p.filter((e) => e.id !== id));
    setDeleteId(null);
    showToast("Expense deleted.", "warning");
  }

  function openAdd() { setEditExpense(null); setShowExpModal(true); }
  function openEdit(e) { setEditExpense(e); setShowExpModal(true); }

  function createGroup(name, currency, budget) {
    const newGroupId = "g" + Date.now();
    setGroups((p) => [...p, {
      id: newGroupId,
      name: name || "New Family Group",
      budget: budget || 2000,
      currency: currency || "USD",
      members: [{ userId: currentUser.id, role: "admin" }],

    setActiveTab("dashboard");

  function deleteGroup() {
    const gid = group.id;
    setGroups((prev) => prev.filter((g) => g.id !== gid));
    setExpenses((prev) => prev.filter((e) => e.groupId !== gid));
    setShowSettingsModal(false);
    setActiveGroupId(null);
    showToast("Group deleted.", "warning");
  }

  function switchGroup(id) {
    const target = groups.find((g) => g.id === id);
    setActiveGroupId(id);

    setShowProfileMenu(false);
    setActiveTab("dashboard");

  function setMemberRole(userId, role) {
    setGroups((prev) => prev.map((g) => {

      return { ...g, members: g.members.map((m) => m.userId === userId ? { ...m, role } : m) };
    }));
    const u = users.find((u) => u.id === userId);
    const name = u?.name.split(" ")[0] || "Member";
    showToast(role === "admin" ? `${name} is now an admin 👑` : `${name} is now a member`, "success");
  }

  // Remove a member from the active group (admin only, cannot remove self if last admin)
  function removeMember(userId) {
    const target = group.members.find((m) => m.userId === userId);
    const adminCount = group.members.filter((m) => m.role === "admin").length;
    if (target?.role === "admin" && adminCount <= 1) {
      showToast("Can't remove the only admin. Promote someone else first.", "error");
      setRemoveMemberId(null);
      return;
    }
    setGroups((prev) => prev.map((g) => {
      if (g.id !== group.id) return g;
      return { ...g, members: g.members.filter((m) => m.userId !== userId) };
    }));
    // Also remove their expenses in this group (optional: keep history instead)
    setExpenses((prev) => prev.filter((e) => !(e.groupId === group.id && e.userId === userId)));
    setRemoveMemberId(null);

    if (userId === currentUser.id) {
      showToast(`You left "${group.name}".`, "info");
      setActiveGroupId(null);
    } else {
      showToast(`${u?.name || "Member"} removed from group.`, "warning");

  }

    removeMember(currentUser.id);

        {activeTab === "transactions" && (

              <span style={{ fontSize: 14, color: "#7B7E8E" }}>🔍</span>

            </div>

            <div style={S.filterRow}>
              <button className="sw-press" style={S.chip(filter === "all", "#7B7E8E")} onClick={() => setFilter("all")}>All</button>
              {CATEGORIES.map((c) => (

            {filtered.length === 0 ? (
              <div style={S.empty}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>🔍</div>

                    const user = users.find((u) => u.id === e.userId);
                    const canEdit = isAdmin || e.userId === currentUser.id;
                    return (
                      <div key={e.id} style={{ ...S.txItem, borderBottom: i < items.length - 1 ? "1px solid #1D1E28" : "none" }}>
                        <div style={S.txIcon(cat.color)}>{cat.icon}</div>
                        <div style={S.txInfo}>
                          <div style={S.txTitle}>{e.title}</div>
                          <div style={S.txMeta}>
                            {user && <Avatar user={user} size={13} />}
                            <span>{user?.name.split(" ")[0]}</span>
                            {e.note && <span>· {e.note}</span>}
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                          <div style={S.txAmount}>-{money(e.amount, group.currency)}</div>
                          {canEdit && (
                            <div style={{ display: "flex", gap: 4 }}>
                              <button className="sw-press" style={S.iconBtn("#8B7CFF")} onClick={() => openEdit(e)}>✏️</button>
                              <button className="sw-press" style={S.iconBtn("#FB7185")} onClick={() => setDeleteId(e.id)}>🗑️</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ══════════════ MEMBERS ══════════════ */}
        {activeTab === "members" && (
          <div className="sw-fadein" key="members">
            {isAdmin && (
              <button className="sw-press" style={{ width: "100%", padding: 14, background: "linear-gradient(135deg,#8B7CFF,#6D5AE0)", border: "none", borderRadius: 14, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", marginBottom: 16, boxShadow: "0 4px 18px rgba(139,124,255,0.35)" }}
                onClick={() => setShowInvModal(true)}>
                + Invite Family Member
              </button>
            )}

            {byMember.map((m) => {
              const myExpenses = groupExpenses.filter((e) => e.userId === m.id).sort((a, b) => (a.date < b.date ? 1 : -1));
              const isSelf = m.id === currentUser.id;
              const canManage = isAdmin; // admins can manage everyone (including self, with safeguards below)
              return (
                <div key={m.id} className="sw-card-hover" style={S.card}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                    <Avatar user={m} size={46} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 16, fontWeight: 700 }}>{m.name}</span>
                        <span style={{ fontSize: 10, color: m.color, fontWeight: 600, background: m.color + "22", padding: "2px 8px", borderRadius: 20, textTransform: "uppercase" }}>{m.role}</span>
                        {isSelf && <span style={{ fontSize: 10, color: "#7B7E8E" }}>(you)</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "#7B7E8E", marginTop: 2 }}>{m.email}</div>
                    </div>
                  </div>

                  {/* Member stats row */}
                  <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                    {[["Total Spent", m.color, `${money(m.total, group.currency)}`],["Transactions","#7B7E8E",m.count],["Share","#FBBF24",totalSpent > 0 ? `${Math.round((m.total/totalSpent)*100)}%` : "0%"]].map(([l,c,v]) => (
                      <div key={l} style={{ flex: 1, background: "#0A0B12", borderRadius: 12, padding: "10px 12px", border: `1px solid ${c}22` }}>
                        <div style={{ fontSize: 9, color: "#7B7E8E", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{l}</div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: c }}>{v}</div>
                      </div>
                    ))}
                  </div>

                  {/* Admin management controls */}
                  {canManage && (
                    <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                      {m.role === "member" ? (
                        <button
                          className="sw-press"
                          style={{ flex: 1, padding: "9px 0", borderRadius: 10, border: "1.5px solid #8B7CFF44", background: "#8B7CFF18", color: "#8B7CFF", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                          onClick={() => setMemberRole(m.id, "admin")}
                        >
                          👑 Make Admin
                        </button>
                      ) : (
                        <button
                          className="sw-press"
                          style={{ flex: 1, padding: "9px 0", borderRadius: 10, border: "1.5px solid #24262F88", background: "#0A0B12", color: "#7B7E8E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                          onClick={() => setMemberRole(m.id, "member")}
                        >
                          👤 Make Member
                        </button>
                      )}
                      <button
                        className="sw-press"
                        style={{ flex: 1, padding: "9px 0", borderRadius: 10, border: "1.5px solid #FB718544", background: "#FB718518", color: "#FB7185", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                        onClick={() => setRemoveMemberId(m.id)}
                      >
                        {isSelf ? "🚪 Leave Group" : "🗑️ Remove"}
                      </button>
                    </div>
                  )}
                  {!canManage && isSelf && (
                    <div style={{ marginBottom: 14 }}>
                      <button
                        className="sw-press"
                        style={{ width: "100%", padding: "9px 0", borderRadius: 10, border: "1.5px solid #FB718544", background: "#FB718518", color: "#FB7185", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                        onClick={() => setRemoveMemberId(m.id)}
                      >
                        🚪 Leave Group
                      </button>
                    </div>
                  )}

                  {/* Recent expenses */}
                  <div style={{ fontSize: 10, color: "#7B7E8E", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.7, marginBottom: 8 }}>Recent Expenses</div>
                  {myExpenses.length === 0 ? (
                    <div style={{ fontSize: 13, color: "#7B7E8E", textAlign: "center", padding: "12px 0" }}>No expenses yet</div>
                  ) : myExpenses.slice(0, 3).map((e, i) => {
                    const cat = getCat(e.category);
                    return (
                      <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderTop: i > 0 ? "1px solid #1D1E28" : "none" }}>

                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500 }}>{e.title}</div>
                          <div style={{ fontSize: 10, color: "#7B7E8E" }}>{formatDateLabel(e.date)}</div>
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#FB7185" }}>-{money(e.amount, group.currency)}</div>
                      </div>
                    );
                  })}
                  {myExpenses.length > 3 && (
                    <div style={{ fontSize: 12, color: "#8B7CFF", textAlign: "center", paddingTop: 8, cursor: "pointer" }}
                      onClick={() => { setMemberFilter(m.id); setActiveTab("transactions"); }}>
                      +{myExpenses.length - 3} more →
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ══════════════ ANALYTICS ══════════════ */}
        {activeTab === "analytics" && (
          <div className="sw-fadein" key="analytics">
            <div style={S.statsRow}>
              <div style={S.statCard("#8B7CFF")}>
                <div style={S.statLabel}>Total Spent</div>
                <div style={S.statVal("#8B7CFF")}>{money(totalSpent, group.currency)}</div>
              </div>
              <div style={S.statCard(remaining >= 0 ? "#34D399" : "#FB7185")}>
                <div style={S.statLabel}>{remaining >= 0 ? "Remaining" : "Over budget"}</div>
                <div style={S.statVal(remaining >= 0 ? "#34D399" : "#FB7185")}>{money(Math.abs(remaining), group.currency)}</div>
              </div>
            </div>

            <div className="sw-card-hover" style={S.card}>
              <div style={S.sectionTitle}>Spending by Member</div>
              {byMember.length === 0 ? (
                <div style={{ color: "#7B7E8E", fontSize: 13, textAlign: "center", padding: "16px 0" }}>No data yet</div>
              ) : byMember.map((m) => (
                <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <Avatar user={m} size={32} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 13 }}>{m.name.split(" ")[0]}</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: m.color }}>{money(m.total, group.currency)}</span>
                    </div>
                    <div style={S.barTrack}>
                      <div style={S.barFill(m.color, m.total / maxMemberTotal)} />
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: "#7B7E8E", width: 28, textAlign: "right" }}>
                    {totalSpent > 0 ? `${Math.round((m.total / totalSpent) * 100)}%` : "0%"}
                  </div>
                </div>
              ))}
            </div>

            <div className="sw-card-hover" style={S.card}>
              <div style={S.sectionTitle}>Spending by Category</div>
              {byCategory.length === 0 ? (
                <div style={{ color: "#7B7E8E", fontSize: 13, textAlign: "center", padding: "16px 0" }}>No data yet</div>
              ) : byCategory.map((c) => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <div style={{ width: 34, height: 34, borderRadius: 10, background: c.color + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>{c.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 13 }}>{c.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: c.color }}>{money(c.total, group.currency)}</span>
                    </div>
                    <div style={S.barTrack}>
                      <div style={S.barFill(c.color, c.total / maxCatTotal)} />
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: "#7B7E8E", width: 28, textAlign: "right" }}>
                    {totalSpent > 0 ? `${Math.round((c.total / totalSpent) * 100)}%` : "0%"}
                  </div>
                </div>
              ))}
            </div>

            <div className="sw-card-hover" style={S.card}>
              <div style={S.sectionTitle}>Fair Share Analysis</div>
              {members.length === 0 ? (
                <div style={{ color: "#7B7E8E", fontSize: 13, textAlign: "center", padding: "16px 0" }}>No members yet</div>
              ) : (
                <>
                  <div style={{ fontSize: 12, color: "#7B7E8E", marginBottom: 14 }}>Equal split of {money(totalSpent, group.currency)} among {members.length} members = {money(totalSpent / members.length, group.currency)} each</div>
                  {byMember.map((m) => {
                    const fairShare = totalSpent / members.length;
                    const diff = m.total - fairShare;
                    return (
                      <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: "1px solid #1D1E28" }}>
                        <Avatar user={m} size={30} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500 }}>{m.name.split(" ")[0]}</div>
                          <div style={{ fontSize: 11, color: "#7B7E8E" }}>paid {money(m.total, group.currency)}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: diff >= 0 ? "#34D399" : "#FB7185" }}>
                            {diff >= 0 ? "+" : ""}{money(diff, group.currency)}
                          </div>
                          <div style={{ fontSize: 10, color: "#7B7E8E" }}>{diff >= 0 ? "overpaid" : "underpaid"}</div>
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        )}
      </div>

      {/* ── Modals ── */}
      {showExpModal && (
        <ExpenseModal
          onClose={() => { setShowExpModal(false); setEditExpense(null); }}
          onSave={saveExpense}
          initial={editExpense}
          members={members}
          currentUserId={currentUser.id}
          isAdmin={isAdmin}
          currency={group.currency}
        />
      )}

      {showInvModal && (
        <InviteModal onClose={() => setShowInvModal(false)} onInvite={handleInvite} users={users} group={group} />
      )}

      {showSettingsModal && (
        <GroupSettingsModal
          onClose={() => setShowSettingsModal(false)}
          group={group}
          memberCount={members.length}
          onSave={(updates) => { setGroups((prev) => prev.map((g) => g.id === group.id ? { ...g, ...updates } : g)); setShowSettingsModal(false); showToast("Group settings updated.", "success"); }}
          onDeleteGroup={deleteGroup}
        />
      )}

      {showProfileModal && (
        <ProfileModal
          onClose={() => setShowProfileModal(false)}
          onSave={updateProfile}
          onDeleteAccount={deleteAccount}
          currentUser={currentUser}
          users={users}
        />
      )}

      {showGroupSwitcher && (
        <div className="sw-fadein" style={S.switcherOverlay} onClick={(e) => e.target === e.currentTarget && setShowGroupSwitcher(false)}>
          <div className="sw-sheet-anim" style={S.switcherSheet}>
            <div style={{ width: 40, height: 4, background: "#24262F", borderRadius: 4, margin: "0 auto 20px" }} />
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Your Family Groups</div>
            {myGroups.map((g) => (
              <div key={g.id} className="sw-press sw-card-hover" style={S.groupRow(g.id === group.id)} onClick={() => switchGroup(g.id)}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "#8B7CFF22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
                  {getCurrency(g.currency).flag}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{g.name}</div>
                  <div style={{ fontSize: 11, color: "#7B7E8E" }}>{g.members.length} members · {g.currency}</div>
                </div>
                {g.id === group.id && <span style={{ color: "#8B7CFF", fontSize: 18 }}>✓</span>}
              </div>
            ))}
            <button
              className="sw-press"
              style={{ width: "100%", padding: 14, background: "linear-gradient(135deg,#8B7CFF,#6D5AE0)", border: "none", borderRadius: 13, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8, boxShadow: "0 4px 18px rgba(139,124,255,0.35)" }}
              onClick={() => { setShowGroupSwitcher(false); setShowCreateGroupModal(true); }}
            >
              + Create New Family Group
            </button>
            <button className="sw-press" style={{ width: "100%", padding: 13, background: "transparent", border: "1.5px solid #24262F", borderRadius: 13, color: "#7B7E8E", fontSize: 14, cursor: "pointer", marginTop: 10 }} onClick={() => setShowGroupSwitcher(false)}>
              Close
            </button>
          </div>
        </div>
      )}

      {showCreateGroupModal && (
        <CreateGroupModal
          onClose={() => setShowCreateGroupModal(false)}
          onCreate={(name, currency, budget) => { createGroup(name, currency, budget); setShowCreateGroupModal(false); }}
        />
      )}

      {deleteId && (
        <ConfirmDialog
          title="Delete expense?"
          description="This cannot be undone."
          confirmLabel="Delete"
          onCancel={() => setDeleteId(null)}
          onConfirm={() => deleteExpense(deleteId)}
        />
      )}

      {removeMemberId && (() => {
        const target = members.find((m) => m.id === removeMemberId);
        const isSelf = removeMemberId === currentUser.id;
        return (
          <ConfirmDialog
            title={isSelf ? "Leave this group?" : `Remove ${target?.name.split(" ")[0]}?`}
            description={isSelf
              ? "You'll lose access to this group's expenses. This can't be undone unless an admin re-invites you."
              : `${target?.name} will be removed from ${group.name} and their expenses in this group will be deleted.`}
            confirmLabel={isSelf ? "Leave" : "Remove"}
            onCancel={() => setRemoveMemberId(null)}
            onConfirm={() => removeMember(removeMemberId)}
          />
        );
      })()}

      {showResetConfirm && (
        <ConfirmDialog
          title="Reset all app data?"
          description="This permanently deletes all accounts, groups, and expenses stored on this device. This cannot be undone."
          confirmLabel="Reset Everything"
          onCancel={() => setShowResetConfirm(false)}
          onConfirm={() => {
            localStorage.removeItem(STORAGE_KEY);
            window.location.reload();
          }}
        />
      )}

      {/* ── Floating Bottom Navigation ── */}
      <nav style={S.navBar}>
        {[["dashboard","🏠","Home"],["transactions","🧾","Expenses"],["members","👨‍👩‍👧","Family"],["analytics","📊","Insights"]].map(([id,icon,lbl]) => {
          const active = activeTab === id;
          return (
            <button key={id} className="sw-press" style={S.navItem(active)} onClick={() => { setActiveTab(id); setShowProfileMenu(false); }}>
              <span style={S.navIcon(active)}>{icon}</span>
              <span style={S.navLabel(active)}>{lbl}</span>
            </button>
          );
        })}
      </nav>

      {/* Toast notifications */}
      <div style={S.toastContainer}>
        {toasts.map((t) => {
          const cfg = TOAST_CONFIG[t.type] || TOAST_CONFIG.success;
          return (
            <div key={t.id} className={t.leaving ? "sw-toast-out" : "sw-toast-in"} style={S.toast(cfg.color, cfg.bg)}>
              <div style={S.toastIcon(cfg.color, cfg.bg)}>{cfg.icon}</div>
              <div style={S.toastMsg}>{t.message}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    label: { fontSize: 11, color: "#7B7E8E", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6, display: "block" },
    input: { width: "100%", background: "#0A0B12", border: "1.5px solid #24262F", borderRadius: 12, padding: "12px 14px", color: "#F2F3F7", fontSize: 15, fontFamily: "inherit", outline: "none", boxSizing: "border-box", marginBottom: 16 },
    saveBtn: { width: "100%", padding: 14, background: "linear-gradient(135deg,#8B7CFF,#6D5AE0)", border: "none", borderRadius: 13, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 20px rgba(139,124,255,0.35)" },
    cancelBtn: { width: "100%", padding: 13, background: "transparent", border: "1.5px solid #24262F", borderRadius: 13, color: "#7B7E8E", fontSize: 14, cursor: "pointer", marginTop: 10 },
    error: { background: "#FB718522", border: "1px solid #FB718544", borderRadius: 10, padding: "10px 14px", color: "#FB7185", fontSize: 13, marginBottom: 16 },
  };

  function create() {
    if (!name.trim()) { setError("Please enter a group name."); return; }
    const b = parseFloat(budget);
    onCreate(name.trim(), currency, isNaN(b) || b <= 0 ? 2000 : b);
  }

  return (
    <div className="sw-fadein" style={S.overlay} onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="sw-sheet-anim" style={S.card}>
        <div style={S.title}>Create Family Group</div>
        <div style={S.sub}>Start a new group — you'll be the admin.</div>
        {error && <div style={S.error}>⚠️ {error}</div>}

        <label style={S.label}>Group Name</label>
        <input style={S.input} placeholder="e.g. Smith Family, Roommates…" value={name} onChange={(e) => setName(e.target.value)} />

        <label style={S.label}>Monthly Budget</label>
        <input style={S.input} type="number" min="0" step="1" value={budget} onChange={(e) => setBudget(e.target.value)} />

        <label style={S.label}>Currency</label>
        <select style={{ ...S.input, appearance: "none", cursor: "pointer" }} value={currency} onChange={(e) => setCurrency(e.target.value)}>
          {CURRENCIES.map((c) => (
            <option key={c.code} value={c.code}>{c.flag} {c.code} — {c.name} ({c.symbol})</option>
          ))}
        </select>

        <button className="sw-press" style={S.saveBtn} onClick={create}>Create Group</button>
        <button className="sw-press" style={S.cancelBtn} onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

// ─── GENERIC CONFIRM DIALOG ──────────────────────────────────────────────────────

function ConfirmDialog({ title, description, confirmLabel, onCancel, onConfirm }) {
  const S = {
    overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 20, backdropFilter: "blur(4px)" },
    card: { background: "linear-gradient(165deg, #181A26 0%, #14151E 100%)", borderRadius: 22, padding: 24, width: "100%", maxWidth: 340, border: "1px solid #24262F", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" },
  };
  return (
    <div className="sw-fadein" style={S.overlay}>
      <div className="sw-sheet-anim" style={S.card}>
        <div style={{ fontSize: 17, fontWeight: 800, marginBottom: 8, fontFamily: "'Plus Jakarta Sans',sans-serif" }}>{title}</div>
        <div style={{ fontSize: 13, color: "#7B7E8E", marginBottom: 20, lineHeight: 1.5 }}>{description}</div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="sw-press" style={{ flex: 1, padding: 13, background: "#1D1E28", border: "1.5px solid #24262F", borderRadius: 12, color: "#F2F3F7", fontWeight: 600, cursor: "pointer" }} onClick={onCancel}>Cancel</button>
          <button className="sw-press" style={{ flex: 1, padding: 13, background: "#FB718522", border: "1.5px solid #FB7185", borderRadius: 12, color: "#FB7185", fontWeight: 700, cursor: "pointer" }} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
document.getElementById('splash').style.display = 'none';
</script>
</body>
</html>
